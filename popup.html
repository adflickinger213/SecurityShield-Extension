<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Security Shield</title>
    <style>
        * { margin: 0; padding: 0; }
        body { width: 350px; font-family: Arial, sans-serif; background: #667eea; color: #333; }
        .header { background: #667eea; color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 20px; }
        .content { padding: 20px; background: white; }
        .status-card { background: #f5f5f5; border-left: 4px solid #667eea; border-radius: 6px; padding: 12px; margin: 10px 0; }
        .status-label { font-weight: 600; font-size: 13px; }
        .status-value { font-size: 12px; color: #666; margin: 5px 0; }
        .tips { background: #e7f3ff; border: 1px solid #b3d9ff; border-radius: 6px; padding: 10px; margin: 15px 0; font-size: 11px; line-height: 1.6; }
        button { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; margin: 5px 0; width: 100%; }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #e9ecef; }
    </style>
  </head>
  <body>
    <div class="header"><h1>🛡️ Security Shield</h1></div>
    <div class="content">
      <div class="status-card">
        <div class="status-label">Connection Status</div>
        <div class="status-value" id="status">Checking...</div>
      </div>
      <div class="tips">
        <strong>🔐 Security Tips:</strong><br>
        Always verify URLs before clicking<br>
        Check for 🔐 in address bar<br>
        Never enter passwords on HTTP<br>
        Be cautious of urgent requests
      </div>
      <button class="btn-primary" id="view-log">View Log</button>
      <button class="btn-secondary" id="clear-log">Clear Log</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
